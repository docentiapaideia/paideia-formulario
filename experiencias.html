<form id="formExperiencia">
  <input type="text" name="nombre" placeholder="Nombre y apellido" required>
  <input type="email" name="email" placeholder="Correo electrónico" required>
  <input type="text" name="institucion" placeholder="Institución" required>

  <select name="rol" required>
    <option value="">Seleccionar rol</option>
    <option value="Docente">Docente</option>
    <option value="Directivo">Directivo</option>
    <option value="Estudiante">Estudiante</option>
    <option value="Otro">Otro</option>
  </select>

  <textarea name="experiencia" placeholder="Contá tu experiencia" required></textarea>

  <input type="url" name="enlace" placeholder="Enlace a carpeta o material compartido" required>

  <p>
    Por favor, verificá que la carpeta indicada esté compartida correctamente.
  </p>

  <button type="submit">Enviar experiencia</button>
</form>

<script>
const URL_SCRIPT = 'PEGAR_ACA_URL_DEL_APPS_SCRIPT';

document.getElementById('formExperiencia').addEventListener('submit', async function(e) {
  e.preventDefault();

  const formData = new FormData(this);
  const data = Object.fromEntries(formData.entries());

  const respuesta = await fetch(URL_SCRIPT, {
    method: 'POST',
    body: JSON.stringify(data)
  });

  const resultado = await respuesta.json();

  if (resultado.ok) {
    alert('Experiencia enviada correctamente. Quedará pendiente de validación.');
    this.reset();
  } else {
    alert('Error al enviar la experiencia.');
    console.error(resultado.error);
  }
});
</script>
